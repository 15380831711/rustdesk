name: Publish to WinGet
on:
  workflow_dispatch:
  # Auto-build disabled - manual trigger only
  # release:
  #   types: [released]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: RustDesk.RustDesk
          version: "1.4.6"
          release-tag: "1.4.6"
          token: ${{ secrets.WINGET_TOKEN }}
